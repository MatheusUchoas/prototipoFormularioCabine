<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist da Cabine</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f6;
      color: #222;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

   .card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
  padding: 18px;
  overflow: auto;
  max-width: 1320px;
  margin: 0 auto;
}

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #666;
      font-size: 15px;
    }

    .diagram-shell {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    .diagram-wrap {
      position: absolute;
      left: 0;
      top: 0;
      width: 1200px;
      height: 1220px;
      background: #fff;
      transform-origin: top left;
      will-change: transform;
    }

    .diagram-image {
      position: absolute;
      left: 215px;
      top: 20px;
      width: 760px;
      max-width: none;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .item {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      line-height: 1.2;
      background: rgba(255,255,255,.92);
      padding: 4px 8px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      max-width: 290px;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      flex: 0 0 auto;
      cursor: pointer;
    }

    .item label {
      cursor: pointer;
      font-weight: 600;
    }

    .legend {
      margin-top: 24px;
      padding: 18px;
      border-radius: 14px;
      background: #fafafa;
      border: 1px solid #ececec;
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 1024px) {
      .page { padding: 18px; }
      .card { padding: 16px; border-radius: 16px; }
    }

    @media (max-width: 768px) {
      .page { padding: 10px; }
      .card {
        padding: 10px;
        border-radius: 14px;
      }
      h1 { font-size: 22px; }
      .subtitle {
        margin-bottom: 14px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <div class="diagram-shell">
        <div class="diagram-wrap">
        <img src="cabineLinhas.png" alt="Desenho da cabine" class="diagram-image" />

        <!-- Lado esquerdo / topo -->
        <div class="item" style="left: 405px; top: 75px;"><input id="i2" type="checkbox"><label for="i2">2 - GRAXA PINÇA</label></div>
        <div class="item" style="left: 255px; top: 160px;"><input id="i3" type="checkbox"><label for="i3">3 - PARAFUSOS PINÇA (Torque 200N.m)</label></div>
        <div class="item" style="left: 305px; top: 260px;"><input id="i4" type="checkbox"><label for="i4">4 - PALMOLE</label></div>
        <div class="item" style="left: 125px; top: 345px;"><input id="i5" type="checkbox"><label for="i5">5 - RODA 160 a 152 mm (Dianteira e Traseira) (Torque 390N.m)</label></div>
        <div class="item" style="left: 410px; top: 415px;"><input id="i29" type="checkbox"><label for="i29">29 - PESCOÇO</label></div>
        <div class="item" style="left: 185px; top: 460px;"><input id="i13" type="checkbox"><label for="i13">13 - TORQUE 110N.m</label></div>
        <div class="item" style="left: 180px; top: 550px;"><input id="i14" type="checkbox"><label for="i14">14 - PARAFUSO DE SUSTENTAÇÃO DA CABINE (195N.m)</label></div>
        <div class="item" style="left: 140px; top: 650px;"><input id="i18" type="checkbox"><label for="i18">18/21/25 - TETO (Interno e Externo)</label></div>
        <div class="item" style="left: 135px; top: 760px;"><input id="i19" type="checkbox"><label for="i19">19/22 - ACRÍLICOS (Interno e Externo)</label></div>
        <div class="item" style="left: 210px; top: 855px;"><input id="i20" type="checkbox"><label for="i20">20 - BORRACHAS</label></div>
        <div class="item" style="left: 105px; top: 925px;"><input id="i27" type="checkbox"><label for="i27">27/28 - CARROCERIA (Interna e Externa)</label></div>
        <div class="item" style="left: 355px; top: 1045px;"><input id="i17" type="checkbox"><label for="i17">17 - PINO REI</label></div>
        <div class="item" style="left: 425px; top: 1095px;"><input id="ipino" type="checkbox"><label for="ipino">PARAFUSO PINO REI (90 N.M)</label></div>

        <!-- Lado direito / topo -->
        <div class="item" style="left: 690px; top: 70px;"><input id="i30" type="checkbox"><label for="i30">30 - ESTEIRA</label></div>
        <div class="item" style="left: 740px; top: 180px;"><input id="i6" type="checkbox"><label for="i6">6 - Roda 140 a 131 mm (Torque 390N.m)</label></div>
        <div class="item" style="left: 760px; top: 265px;"><input id="i8" type="checkbox"><label for="i8">8 - GRAXA MOLA</label></div>
        <div class="item" style="left: 780px; top: 325px;"><input id="i7" type="checkbox"><label for="i7">7 - RODA 140mm (Copo)</label></div>
        <div class="item" style="left: 790px; top: 360px;"><input id="i1" type="checkbox"><label for="i1">1 - MOLAS</label></div>
        <div class="item" style="left: 765px; top: 400px;"><input id="i9" type="checkbox"><label for="i9">9 - TORQUE 390N.m</label></div>
        <div class="item" style="left: 770px; top: 460px;"><input id="i10" type="checkbox"><label for="i10">10 - BUMERANGUE</label></div>
        <div class="item" style="left: 775px; top: 520px;"><input id="i11" type="checkbox"><label for="i11">11 - MANGOTE</label></div>
        <div class="item" style="left: 745px; top: 605px;"><input id="i12" type="checkbox"><label for="i12">12 - MOLAS DA SUSPENSÃO (Lubrificação e Limpeza)</label></div>
        <div class="item" style="left: 775px; top: 760px;"><input id="i23" type="checkbox"><label for="i23">23 - ASSENTOS</label></div>
        <div class="item" style="left: 785px; top: 840px;"><input id="i26" type="checkbox"><label for="i26">26 - HASTE DOS ASSENTOS</label></div>
        <div class="item" style="left: 765px; top: 920px;"><input id="i15" type="checkbox"><label for="i15">15 - PORTAS</label></div>
        <div class="item" style="left: 760px; top: 995px;"><input id="i16" type="checkbox"><label for="i16">16 - ENGRENAGENS</label></div>
        <div class="item" style="left: 635px; top: 1055px;"><input id="i24" type="checkbox"><label for="i24">24 - ASSOALHO</label></div>
        </div>
      </div>

    </div>
  </div>
  <script>
    (function () {
      const BASE_WIDTH = 1200;
      const BASE_HEIGHT = 1220;
      const shell = document.querySelector('.diagram-shell');
      const wrap = document.querySelector('.diagram-wrap');

      if (!shell || !wrap) return;

      function resizeDiagram() {
        const availableWidth = shell.clientWidth;
        const scale = Math.min(1, availableWidth / BASE_WIDTH);
        wrap.style.transform = `scale(${scale})`;
        shell.style.height = `${BASE_HEIGHT * scale}px`;
      }

      window.addEventListener('load', resizeDiagram);
      window.addEventListener('resize', resizeDiagram);

      if ('ResizeObserver' in window) {
        new ResizeObserver(resizeDiagram).observe(shell);
      }

      resizeDiagram();
    })();
  </script>
</body>
</html>
